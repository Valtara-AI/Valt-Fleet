# Nginx Configuration for Fleet Management System
# DDoS/DoS Protection and Security Hardening

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Map for blocking user agents
map $http_user_agent $bad_bot {
    default 0;
    ~*malicious 1;
    ~*backdoor 1;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*nmap 1;
    ~*masscan 1;
}

# Rate limit status
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name fleet.valtara.ai;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleet.valtara.ai;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/fleet.valtara.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleet.valtara.ai/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fleet.valtara.ai/chain.pem;
    
    # DH Parameters
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://fleet.valtara.ai wss://fleet.valtara.ai;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Remove server tokens
    server_tokens off;
    more_clear_headers Server;

    # Request size limits
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    client_max_body_size 2M;
    large_client_header_buffers 2 1k;

    # Timeouts
    client_body_timeout 10;
    client_header_timeout 10;
    keepalive_timeout 5 5;
    send_timeout 10;

    # Connection limits
    limit_conn addr 10;

    # Block bad bots
    if ($bad_bot) {
        return 403;
    }

    # Block requests with no user agent
    if ($http_user_agent = "") {
        return 403;
    }

    # Block suspicious request methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # Root and index
    root /var/www/fleet.valtara.ai/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/fleet.valtara.ai.access.log;
    error_log /var/log/nginx/fleet.valtara.ai.error.log warn;

    # API routes with stricter rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_log_level warn;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Login/Auth endpoints with very strict rate limiting
    location ~ ^/(api/auth|api/login|api/register) {
        limit_req zone=login burst=3 nodelay;
        limit_req_log_level error;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://localhost:3000;
        access_log off;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # Block common exploit paths
    location ~ /(wp-admin|wp-login|phpMyAdmin|phpmyadmin|admin|administrator) {
        deny all;
        return 404;
    }

    # Default route for SPA
    location / {
        limit_req zone=general burst=10 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fleet.valtara.ai;

    ssl_certificate /etc/letsencrypt/live/fleet.valtara.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleet.valtara.ai/privkey.pem;

    return 301 https://fleet.valtara.ai$request_uri;
}
