# Fail2Ban Configuration for Fleet Management
# Place this in /etc/fail2ban/jail.local

[DEFAULT]
# Ban time: 1 hour
bantime = 3600
# Find time window: 10 minutes
findtime = 600
# Max retries before ban
maxretry = 5
# Backend
backend = systemd
# Destemail
destemail = security@valtara.ai
# Sender email
sender = fail2ban@valtara.ai
# Action
action = %(action_mwl)s

[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 86400

[nginx-http-auth]
enabled = true
filter = nginx-http-auth
port = http,https
logpath = /var/log/nginx/*error.log

[nginx-noscript]
enabled = true
port = http,https
filter = nginx-noscript
logpath = /var/log/nginx/*access.log
maxretry = 6

[nginx-badbots]
enabled = true
port = http,https
filter = nginx-badbots
logpath = /var/log/nginx/*access.log
maxretry = 2
bantime = 86400

[nginx-noproxy]
enabled = true
port = http,https
filter = nginx-noproxy
logpath = /var/log/nginx/*access.log
maxretry = 2

[nginx-limit-req]
enabled = true
filter = nginx-limit-req
port = http,https
logpath = /var/log/nginx/*error.log
maxretry = 10
findtime = 60
bantime = 7200

# Custom filter for API abuse
[fleet-api-abuse]
enabled = true
port = http,https
filter = fleet-api-abuse
logpath = /var/log/nginx/fleet.valtara.ai.access.log
maxretry = 100
findtime = 60
bantime = 3600

# DDoS protection
[nginx-ddos]
enabled = true
port = http,https
filter = nginx-ddos
logpath = /var/log/nginx/fleet.valtara.ai.access.log
maxretry = 200
findtime = 60
bantime = 600

# Block repeated 404s
[nginx-404]
enabled = true
port = http,https
filter = nginx-404
logpath = /var/log/nginx/fleet.valtara.ai.access.log
maxretry = 20
findtime = 120
bantime = 600
