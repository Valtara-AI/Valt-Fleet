# Fail2Ban Custom Filters
# Place these in /etc/fail2ban/filter.d/

# fleet-api-abuse.conf
# Detects API abuse patterns
[Definition]
failregex = ^<HOST> -.*"(GET|POST|PUT|DELETE|PATCH) /api/.*" (429|400|401|403)
ignoreregex =

# nginx-ddos.conf
# Detects DDoS patterns
[Definition]
failregex = ^<HOST> -.*"(GET|POST).*" (200|301|302|304|403|404|499|500|502|503)
ignoreregex =

# nginx-404.conf
# Detects repeated 404 errors (scanning)
[Definition]
failregex = ^<HOST> -.*"(GET|POST|HEAD).*" 404
ignoreregex = \.(ico|png|jpg|jpeg|gif|css|js)

# nginx-noscript.conf
# Blocks script kiddies
[Definition]
failregex = ^<HOST> -.*GET.*(\.php|\.asp|\.exe|\.pl|\.cgi|\.scgi)
ignoreregex =

# nginx-badbots.conf
# Blocks known bad bots
[Definition]
failregex = ^<HOST> -.*".*HTTP.*" .* ".*(?:aggressive|email|harvest|libwww|nikto|scan|spider|sqlmap|nmap).*"
ignoreregex =

# nginx-limit-req.conf
# Rate limit violations
[Definition]
failregex = limiting requests, excess:.* by zone.*client: <HOST>
ignoreregex =
