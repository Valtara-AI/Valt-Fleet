# Fleet Management Nginx Configuration with DDoS Protection
# Rate limiting zones
limit_req_zone $binary_remote_addr zone=fleet_general:20m rate=10r/s;
limit_req_zone $binary_remote_addr zone=fleet_api:20m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=fleet_conn:20m;

upstream fleet_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Block bad bots
map $http_user_agent $fleet_bad_bot {
    default 0;
    ~*malicious 1;
    ~*scraper 1;
    ~*scanner 1;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*nmap 1;
    ~*masscan 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name fleet.valtara.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleet.valtara.ai;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/fleet.valtara.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleet.valtara.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FleetSSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_tokens off;

    # Block bad bots
    if ($fleet_bad_bot) {
        return 444;
    }

    # Connection limits
    limit_conn fleet_conn 20;
    client_max_body_size 10M;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;

    location / {
        limit_req zone=fleet_general burst=20 nodelay;
        
        proxy_pass http://fleet_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        limit_req zone=fleet_api burst=10 nodelay;
        
        proxy_pass http://fleet_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static {
        proxy_pass http://fleet_backend;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
